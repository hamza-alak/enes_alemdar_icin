<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="Alemde Şer, Vadide Doğum Günü! 🎁">
    <meta property="og:description" content="Raconu kesmek için dokun...">
    
    <title>Kurtlar Vadisi - Doğum Günü</title>
    
    <style>
        /* GENEL AYARLAR */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d4d4d4;
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden;
            background-color: #050505;
        }

        /* SİNEMATİK EKRAN YÖNETİMİ */
        .screen {
            display: none; 
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            z-index: 1;
        }
        
        /* Ağır ve profesyonel ekran girişi */
        .active {
            display: flex; 
            animation: sinematikGecis 1s ease-out forwards;
        }

        @keyframes sinematikGecis {
            0% { opacity: 0; filter: blur(5px); transform: scale(1.02); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        /* Arka Planlar */
        #ekran-giris { background-image: url('kurtlar_vadisi_ilk_arkaplan.png'); }
        .diger-ekran { background-image: url('kurtlar_vadisi_arkaplan.jpg'); }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        /* AĞIR VE KLASİK BUTON TASARIMI */
        .btn-racon {
            background: rgba(94, 0, 0, 0.8);
            color: white;
            border: 1px solid #8b0000;
            padding: 15px 45px;
            font-size: 20px;
            font-weight: normal;
            font-family: 'Times New Roman', Times, serif;
            cursor: pointer;
            border-radius: 2px;
            margin-top: 30px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.5s ease;
            z-index: 5;
        }
        
        .btn-racon:hover {
            background: rgba(139, 0, 0, 1);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.6);
            border-color: #ff0000;
        }

        /* ========================================== */
        /* PALA TAM SAĞ ALT KÖŞEDE                    */
        /* ========================================== */
        .giris-icerik {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: flex-start; 
            padding-left: 10%; 
        }

        .baslik-kutu { text-align: left; z-index: 10; }

        .sinematik-baslik { 
            font-size: 3.5rem; 
            color: #d4d4d4; 
            margin: 0 0 30px 0; 
            text-shadow: 2px 2px 10px #000; 
            letter-spacing: 2px;
        }

        .pala-sabit {
            position: absolute;
            right: 0;
            bottom: 0;
            height: 75vh; 
            object-fit: contain;
            z-index: 5;
            filter: drop-shadow(-10px 10px 20px rgba(0,0,0,0.9)); 
            pointer-events: none; 
            animation: palaNefes 4s infinite alternate ease-in-out;
        }

        @keyframes palaNefes {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.02) translateY(-5px); }
        }

        /* ========================================== */
        /* KARAKTER SEÇİMİ                            */
        /* ========================================== */
        .char-list { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 450px; margin-top: 20px; z-index: 10;}
        .char-btn {
            display: flex; align-items: center; gap: 25px;
            background: rgba(10, 10, 10, 0.7);
            border: 1px solid #3a0000;
            padding: 10px 15px; 
            cursor: pointer; 
            transition: all 0.4s ease;
        }
        .char-btn:hover { 
            background: rgba(50, 0, 0, 0.8);
            border-color: #8b0000;
            padding-left: 25px; 
        }
        .char-btn img { 
            width: 80px; 
            height: 80px; 
            object-fit: cover; 
            border: 1px solid #5e0000; 
        }
        .char-btn h3 { margin: 0; font-size: 26px; color: #ccc; font-weight: normal; letter-spacing: 1px;}

        /* VİDEO EKRANLARI */
        .video-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; margin-bottom: 10px; width: 100%; max-width: 800px; z-index: 10;
        }
        video { 
            max-width: 100%; 
            width: 650px; 
            border: 1px solid #3a0000; 
            background: #000; 
            display: block; 
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        .yan-yazi {
            font-size: 28px; font-style: italic; color: #a0a0a0; 
            display: none; 
            text-shadow: 2px 2px 5px #000;
            letter-spacing: 1px;
        }

        /* FİNAL EKRANI VE SİNEMATİK MESAJ KUTUSU */
        #final-video { width: 700px; max-width: 100%; border: 1px solid #3a0000; display: block; box-shadow: 0 0 40px rgba(0,0,0,0.9); z-index: 10;}
        #extra-video { display: none; width: 700px; max-width: 100%; border: 1px solid #3a0000; box-shadow: 0 0 40px rgba(0,0,0,0.9); z-index: 10;}
        #video-kahkaha { display: none; width: 700px; max-width: 100%; border: 1px solid #3a0000; box-shadow: 0 0 40px rgba(0,0,0,0.9); z-index: 10;}
        
        #dogumGunuKarti {
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            z-index: 10;
        }
        
        #dogumGunuKarti h2 { 
            color: #fff; 
            font-size: 40px; 
            font-style: italic; 
            font-weight: normal;
            text-shadow: 0 0 15px rgba(255,255,255,0.3); 
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <audio id="vadiMuzigi" src="pusu_muzik.mp3" loop></audio>
    <audio id="sesIlk" src="babayigit.mp3"></audio>

    <div id="ekran-giris" class="screen active">
        <div class="overlay"></div>
        
        <div class="giris-icerik">
            <div class="baslik-kutu">
                <h2 class="sinematik-baslik">Hoşgeldin Babayiğit</h2>
                <button class="btn-racon" onclick="baslangicRaconuKes()">RACON KES</button>
            </div>
        </div>

        <img src="pala.png" alt="Pala" class="pala-sabit">
    </div>

    <div id="ekran-karakterler" class="screen diger-ekran">
        <div class="overlay"></div>
        <h1 class="sinematik-baslik" style="font-size: 3.5rem;">Karakter Seç</h1>
        
        <div class="char-list">
            <div class="char-btn" onclick="karakterSec('cakir')">
                <img src="cakir.png" alt="Çakır">
                <h3>Enes Çakır</h3>
            </div>
            <div class="char-btn" onclick="karakterSec('polat')">
                <img src="polat_alemdar.png" alt="Polat">
                <h3>Enes Alemdar</h3>
            </div>
            <div class="char-btn" onclick="karakterSec('akbey')">
                <img src="aslan_akbey.png" alt="Akbey">
                <h3>Enes Akbey</h3>
            </div>
            <div class="char-btn" onclick="karakterSec('memati')">
                <img src="memati.jpg" alt="Memati">
                <h3>Enes Memati</h3>
            </div>
        </div>
    </div>

    <div id="ekran-cakir" class="screen diger-ekran">
        <div class="overlay"></div>
        <div class="video-container">
            <div id="yazi-cakir" class="yan-yazi">"Azdan az, çoktan çok gider..."</div>
            <video id="video-cakir" src="racon_cakir.mp4" playsinline preload="auto"></video>
        </div>
        <button id="btn-cakir" class="btn-racon" onclick="videoBaslat('cakir')">RACON KES</button>
    </div>

    <div id="ekran-polat" class="screen diger-ekran">
        <div class="overlay"></div>
        <div class="video-container">
            <div id="yazi-polat" class="yan-yazi">"Ben Polat Alemdar'ım!"</div>
            <video id="video-polat" src="ben_polat_alemdarim.mp4" playsinline preload="auto"></video>
        </div>
        <button id="btn-polat" class="btn-racon" onclick="videoBaslat('polat')">RACON KES</button>
    </div>

    <div id="ekran-akbey" class="screen diger-ekran">
        <div class="overlay"></div>
        <div class="video-container">
            <div id="yazi-akbey" class="yan-yazi">"İki kişinin bildiği sır değildir."</div>
            <video id="video-akbey" src="3_2.mp4" playsinline preload="auto"></video>
        </div>
        <button id="btn-akbey" class="btn-racon" onclick="videoBaslat('akbey')">RACON KES</button>
    </div>

    <div id="ekran-memati" class="screen diger-ekran">
        <div class="overlay"></div>
        <div class="video-container">
            <div id="yazi-memati" class="yan-yazi">"Kalk ulan kalk!"</div>
            <video id="video-memati" src="kalk.mp4" playsinline preload="auto"></video>
        </div>
        <button id="btn-memati" class="btn-racon" onclick="videoBaslat('memati')">RACON KES</button>
    </div>

    <div id="ekran-final" class="screen diger-ekran">
        <div class="overlay"></div>
        
        <video id="final-video" src="son_video.mp4" playsinline preload="auto"></video>
        <video id="extra-video" src="dogum1.mp4" playsinline preload="auto"></video>

        <button id="final-btn" class="btn-racon" onclick="finalVideosuBaslat()">RACON KES</button>

        <div id="dogumGunuKarti">
            <h2>İyiki doğdun abim iyiki varsın.</h2>
        </div>

        <video id="video-kahkaha" src="kahkaha.mp4" playsinline preload="auto"></video>
    </div>

    <script>
        // Yumuşak Ekran Geçişi
        function ekraniDegistir(gizlenecekId, gosterilecekId) {
            document.getElementById(gizlenecekId).classList.remove('active');
            setTimeout(() => {
                document.getElementById(gosterilecekId).classList.add('active');
            }, 100); 
        }

        // 1. Aşama
        function baslangicRaconuKes() {
            let fonMuzigi = document.getElementById('vadiMuzigi');
            fonMuzigi.volume = 0.4; 
            fonMuzigi.play();

            let sesIlk = document.getElementById('sesIlk');
            sesIlk.play();

            sesIlk.onended = function() {
                ekraniDegistir('ekran-giris', 'ekran-karakterler');
            };
            
            setTimeout(function() {
                if(document.getElementById('ekran-giris').classList.contains('active')) {
                    ekraniDegistir('ekran-giris', 'ekran-karakterler');
                }
            }, 5000);
        }

        // 2. Aşama
        function karakterSec(karakterAdi) {
            ekraniDegistir('ekran-karakterler', 'ekran-' + karakterAdi);
        }

        // 3. Aşama
        function videoBaslat(karakterAdi) {
            let video = document.getElementById('video-' + karakterAdi);
            let yazi = document.getElementById('yazi-' + karakterAdi);
            let buton = document.getElementById('btn-' + karakterAdi);
            
            buton.style.display = "none";
            yazi.style.display = "block";
            
            video.volume = 1.0;
            video.play();

            video.onended = function() {
                setTimeout(function() {
                    ekraniDegistir('ekran-' + karakterAdi, 'ekran-final');
                }, 1000); 
            };
        }

        // 4. Aşama (Sinematik Final Kurgusu)
        function finalVideosuBaslat() {
            let finalBtn = document.getElementById('final-btn');
            let finalVideo = document.getElementById('final-video');
            let extraVideo = document.getElementById('extra-video'); // Yeni video referansı
            let kart = document.getElementById('dogumGunuKarti');
            let kahkahaVideo = document.getElementById('video-kahkaha');

            finalBtn.style.display = "none";
            finalVideo.play();

            // son_video.mp4 bittiğinde
            finalVideo.onended = function() {
                // son_video.mp4'ü gizle
                finalVideo.style.display = "none";
                // dogum1.mp4'ü göster ve oynat
                extraVideo.style.display = "block";
                extraVideo.play();
            };

            // dogum1.mp4 bittiğinde
            extraVideo.onended = function() {
                // dogum1.mp4'ü gizle
                extraVideo.style.display = "none";
                // Doğum günü kartını göster
                kart.style.display = "flex";

                // Yazı 10 saniye ekranda kalır, sonra kahkaha videosu başlar
                setTimeout(function() {
                    kart.style.display = "none";
                    kahkahaVideo.style.display = "block";
                    kahkahaVideo.play();
                }, 10000);
            };
        }
    </script>
</body>
</html>
